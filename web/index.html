<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>Chuta Xuta WebApp</title>
<style>
:root{--bg:#101a31;--card:#1b2742;--txt:#fff;--mut:#aab4cc;--gold:#ffd21f;--green:#20c65a;--red:#ff3b48;--blue:#3c7cff;--orange:#ff9f1c}
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:radial-gradient(circle at top,#203657,#080d19);color:var(--txt)}
.app{max-width:560px;margin:auto;padding:18px}.hero{text-align:center}.logo{width:130px;height:130px;border-radius:50%;background:white;margin:auto;padding:10px}
.logo img{width:100%;height:100%;object-fit:contain}.title{font-size:38px;font-weight:900;margin:14px 0 4px}.sub{color:var(--mut);letter-spacing:4px;font-weight:800}
.date{display:inline-block;margin:14px;padding:10px 18px;border-radius:25px;background:#ffffff12;color:var(--gold);font-weight:900}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:#ffffff12;border-radius:26px;padding:7px;margin:20px 0}.tab{border:0;border-radius:20px;padding:12px;background:transparent;color:var(--mut);font-weight:900}.tab.on{background:var(--gold);color:#111}
.panel{background:#ffffff12;border:1px solid #ffffff20;border-radius:20px;padding:14px;margin:12px 0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}.stat{background:#00000025;border-radius:18px;padding:16px 6px}.num{font-size:34px;font-weight:900}.lbl{font-size:11px;color:var(--mut);letter-spacing:2px}
.section-title{color:var(--gold);font-weight:900;letter-spacing:2px;text-transform:uppercase}.player{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#ffffff12;border-radius:16px;padding:12px;margin:10px 0}.name{font-weight:900}.badges{display:flex;gap:6px;margin-top:7px}.badge{font-size:11px;border-radius:20px;padding:6px 9px;font-weight:900}.pending{background:#ffd21f35}.ok{background:#20c65a40}.no{background:#ff3b4840}.pay{background:#3c7cff40}.game{background:#ff9f1c40}
.btns{display:flex;gap:6px}.small{border:0;border-radius:10px;padding:10px 12px;color:white;font-weight:900}.bok{background:var(--green)}.bno{background:var(--red)}.bq{background:var(--orange)}
.mainbtn{width:100%;border:0;border-radius:16px;padding:15px;margin:8px 0;background:var(--blue);color:white;font-weight:900;font-size:16px}.green{background:var(--green)}.orange{background:var(--orange)}.hide{display:none}.hint{color:var(--mut);line-height:1.45}
.team{padding:14px;border-radius:18px;margin:10px 0}.team.green{background:#20c65a30}.team.red{background:#ff3b4830}.team.yellow{background:#ffd21f30}.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#000;color:white;padding:14px 20px;border-radius:18px;font-weight:900;display:none;z-index:99}.toast.show{display:block}
input,select,textarea{width:100%;background:#111a30;border:1px solid #2a3757;color:white;border-radius:12px;padding:13px;margin:7px 0}
</style>
</head>
<body>
<div class="app">
<div class="hero"><div class="logo"><img src="logo.png"></div><div class="title">CHUTA XUTA</div><div class="sub">WEBAPP · LEIRIA</div><div class="date" id="gameDate"></div></div>
<div class="tabs"><button class="tab on" id="tpres" onclick="show('pres')">Jogo</button><button class="tab" id="tteams" onclick="show('teams')">Equipas</button><button class="tab" id="tmore" onclick="show('more')">Mais</button><button class="tab" id="taviso" onclick="show('aviso')">Aviso</button></div>
<div id="pres"><div class="panel stats"><div class="stat"><div class="num" id="nOk">0</div><div class="lbl">CONFIRMADOS</div></div><div class="stat"><div class="num" id="nPend">0</div><div class="lbl">PENDENTES</div></div><div class="stat"><div class="num" id="nNo">0</div><div class="lbl">NÃO VÃO</div></div></div><button class="mainbtn" onclick="syncSheets()">🔄 Sincronizar</button><div class="panel"><div class="section-title">Convocatória</div><div id="players"></div></div></div>
<div id="teams" class="hide"><div class="panel"><div class="section-title">Equipas</div><button class="mainbtn green" onclick="drawTeams()">⚽ Sortear 2 Equipas</button><button class="mainbtn orange" onclick="drawThreeTeams()">🟢🔴🟡 Sortear 3 Equipas</button><button class="mainbtn" onclick="shareWhatsApp()">📲 Partilhar WhatsApp</button><div id="teamsBox"></div></div></div>
<div id="more" class="hide"><div class="panel"><div class="section-title">Adicionar jogador pontual</div><input id="newName" placeholder="Nome"><select id="newType"><option value="jogo">Ao jogo</option><option value="mes">Mensalidade</option></select><button class="mainbtn green" onclick="addPlayer()">Adicionar</button></div><div class="panel"><div class="section-title">Importar lista</div><textarea id="bulk" rows="5" placeholder="Um nome por linha"></textarea><button class="mainbtn" onclick="importPlayers()">Importar</button></div></div>
<div id="aviso" class="hide"><div class="panel"><div class="section-title">WebApp</div><p class="hint">Funciona em iPhone, Android e PC. No iPhone: Safari → Partilhar → Adicionar ao ecrã principal.</p></div></div>
</div><div class="toast" id="toast"></div>
<script>
const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycby3L8XI894oQSWqac_cYcLxs5DeW8UbXYH86FI4BeZwFA8CJ2eMnRDEsR-P4lerhE1W/exec";
let players=JSON.parse(localStorage.getItem('cx_web_players')||'[]'), teams=JSON.parse(localStorage.getItem('cx_web_teams')||'[]');
function save(){localStorage.setItem('cx_web_players',JSON.stringify(players));localStorage.setItem('cx_web_teams',JSON.stringify(teams))}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}
function nextThursday(){const n=new Date(),day=n.getDay();if(day===4){const l=new Date(n.getFullYear(),n.getMonth(),n.getDate(),23,30);if(n<l)return new Date(n.getFullYear(),n.getMonth(),n.getDate(),20,30)}const d=new Date(n.getFullYear(),n.getMonth(),n.getDate(),20,30);let add=(4-day+7)%7;if(add===0)add=7;d.setDate(d.getDate()+add);return d}
function setDate(){const d=nextThursday();document.getElementById('gameDate').textContent='⚽ Jogo · '+d.toLocaleDateString('pt-PT',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'})}
function show(id){['pres','teams','more','aviso'].forEach(x=>document.getElementById(x).classList.toggle('hide',x!==id));['tpres','tteams','tmore','taviso'].forEach(x=>document.getElementById(x).classList.remove('on'));document.getElementById('t'+id).classList.add('on');render()}
function normP(v){const s=String(v||'').trim().toUpperCase();if(['SIM','VOU','CONFIRMADO'].includes(s))return 'confirmado';if(['NÃO','NAO','NO'].includes(s))return 'nao';return 'pendente'}
function normT(v){const s=String(v||'').trim().toLowerCase();return ['mês','mes','mensalidade'].includes(s)?'mes':'jogo'}
function syncSheets(){toast('A sincronizar...');const cb='cxWeb'+Date.now();window[cb]=data=>{try{if(!Array.isArray(data)){toast('Resposta inválida');return}const rows=data.filter(r=>r&&r.jogador&&String(r.jogador).trim());if(!rows.length){toast('Sem jogadores válidos');return}const old=players;players=rows.map((r,i)=>{const nome=String(r.jogador).trim(),a=old.find(p=>String(p.name).toLowerCase()===nome.toLowerCase());return{id:a?.id||Date.now()+i,name:nome,status:normP(r.presenca),type:normT(r.pagamento),dinner:String(r.jantar||'').toUpperCase()==='SIM',pontual:!!a?.pontual,paid:!!a?.paid}});save();render();toast('Sincronizado: '+players.length+' jogadores')}catch(e){console.log(e);toast('Erro ao ler dados')}try{delete window[cb]}catch(e){}document.getElementById(cb)?.remove()};const s=document.createElement('script');s.id=cb;s.src=SHEETS_API_URL+'?callback='+cb+'&t='+Date.now();s.onerror=()=>toast('Erro de comunicação');document.body.appendChild(s)}
function enviarSheets(nome,status,tipo,jantar){const payload={jogador:nome,presenca:status==='confirmado'?'SIM':status==='nao'?'NÃO':'',pagamento:tipo==='mes'?'mês':'jogo',jantar:jantar?'SIM':''};fetch(SHEETS_API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>setTimeout(syncSheets,1000)).catch(()=>toast('Guardado localmente'))}
function setStatus(id,status){const p=players.find(x=>x.id===id);if(!p)return;const ns=p.status===status?'pendente':status;players=players.map(x=>x.id===id?{...x,status:ns}:x);save();render();enviarSheets(p.name,ns,p.type,p.dinner)}
function setStatusComPopup(id,status){const p=players.find(x=>x.id===id);if(!p)return;let q=status==='confirmado'?(p.status==='confirmado'?'Desconfirmar presença de ':'Confirmar presença de ')+p.name+'?':status==='nao'?(p.status==='nao'?'Retirar o estado NÃO VAI de ':'Marcar ')+p.name+(p.status==='nao'?'?':' como NÃO VAI?'):'Voltar '+p.name+' a pendente?';if(confirm(q))setStatus(id,status)}
function render(){const ok=players.filter(p=>p.status==='confirmado').length,no=players.filter(p=>p.status==='nao').length;document.getElementById('nOk').textContent=ok;document.getElementById('nNo').textContent=no;document.getElementById('nPend').textContent=Math.max(players.length-ok-no,0);renderPlayers();renderTeams()}
function renderPlayers(){const b=document.getElementById('players');if(!players.length){b.innerHTML='<p class="hint">Carrega em Sincronizar para ir buscar o plantel.</p>';return}b.innerHTML=players.map((p,i)=>`<div class="player"><div><div class="name">${i+1}. ${p.name}</div><div class="badges"><span class="badge ${p.status==='confirmado'?'ok':p.status==='nao'?'no':'pending'}">${p.status==='confirmado'?'CONFIRMADO':p.status==='nao'?'NÃO VAI':'PENDENTE'}</span><span class="badge ${p.type==='mes'?'pay':'game'}">${p.type==='mes'?'MENSALIDADE':'AO JOGO'}</span></div></div><div class="btns"><button class="small bok" onclick="setStatusComPopup(${p.id},'confirmado')">Confirmar</button><button class="small bq" onclick="setStatusComPopup(${p.id},'pendente')">?</button><button class="small bno" onclick="setStatusComPopup(${p.id},'nao')">Não</button></div></div>`).join('')}
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1])}
function drawTeams(){drawTeamsNumber(2)}function drawThreeTeams(){drawTeamsNumber(3)}function drawTeamsNumber(n){const c=players.filter(p=>p.status==='confirmado');if(c.length<4)return toast('Confirma pelo menos 4 jogadores');if(n===3&&c.length<6)return toast('Confirma pelo menos 6 jogadores para 3 equipas');teams=Array.from({length:n},()=>[]);shuffle(c).forEach((p,i)=>teams[i%n].push(p));save();render();show('teams')}
function renderTeams(){const b=document.getElementById('teamsBox');if(!teams.length){b.innerHTML='<p class="hint">Ainda não há equipas sorteadas.</p>';return}const names=['Verde','Vermelha','Amarela'],cls=['green','red','yellow'];b.innerHTML=teams.map((t,i)=>`<div class="team ${cls[i]}"><b>${i===0?'🟢':i===1?'🔴':'🟡'} ${names[i]}</b><ol>${t.map(p=>'<li>'+p.name+'</li>').join('')}</ol></div>`).join('')}
function message(){const c=players.filter(p=>p.status==='confirmado'),n=players.filter(p=>p.status==='nao');let m='⚽ CHUTA XUTA - Convocatória\n📅 Jogo: '+nextThursday().toLocaleDateString('pt-PT',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'})+'\n✅ Confirmados: '+c.length+'\n❌ Não vão: '+n.length+'\n\n';if(teams.length)teams.forEach((t,i)=>m+=(i===0?'🟢 VERDE':i===1?'🔴 VERMELHA':'🟡 AMARELA')+'\n'+t.map((p,k)=>(k+1)+'. '+p.name).join('\n')+'\n\n');else m+='Confirmados:\n'+(c.length?c.map((p,i)=>(i+1)+'. '+p.name).join('\n'):'Ainda sem confirmados')+'\n\n';return m+'⚽ Chuta Xuta F.C.'}
function shareWhatsApp(){window.open('https://wa.me/?text='+encodeURIComponent(message()),'_blank')}
function addPlayer(){const name=document.getElementById('newName').value.trim(),type=document.getElementById('newType').value;if(!name)return toast('Escreve o nome');players.push({id:Date.now(),name,type,status:'pendente',dinner:false});document.getElementById('newName').value='';save();render()}
function importPlayers(){document.getElementById('bulk').value.split('\n').map(x=>x.trim()).filter(Boolean).forEach(name=>players.push({id:Date.now()+Math.random(),name,type:'jogo',status:'pendente',dinner:false}));document.getElementById('bulk').value='';save();render()}
setDate();render();setTimeout(syncSheets,700);
</script>
</body>
</html>
